config:
  nacos:
    host: ${NACOS_HOST:127.0.0.1}:18848
    
server:
  forward-headers-strategy: framework

spring:
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: ${config.nacos.host}
        namespace: dev
      config:
        file-extension: yaml
        server-addr: ${config.nacos.host}
        namespace: dev
        group: DEFAULT_GROUP
  config:
    import: 
      - optional:nacos:octopus-gateway-config.yaml
      - optional:nacos:octopus-gateway-rate-limit-config.yaml
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      database: 0

cookie-domain: .aiolos.com

# 灰度发布配置统一由 Apollo 管理
# 建议在 Apollo 的 application 命名空间配置以下键
# gateway.es.gray.enabled
# gateway.es.gray.user-ids
# gateway.es.gray.percent
# gateway.es.gray.match.service-ids
# gateway.es.gray.match.path-patterns
# gateway.es.gray.instance-tag
# gateway.es.gray.instance-meta-key
# gateway.es.gray.force-gray-by-instance-tag